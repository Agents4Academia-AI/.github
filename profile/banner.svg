<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" role="img" aria-label="Agents4Academia">
  <!-- v2: Manuscript — warm paper, serif wordmark, marginalia network -->
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf7ee"/>
      <stop offset="1" stop-color="#f3ecdc"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="300" fill="url(#paper)"/>

  <!-- ruled lines, like a notebook -->
  <g stroke="#d8cdb4" stroke-width="1">
    <line x1="0" y1="90" x2="1280" y2="90" stroke-opacity="0.55"/>
    <line x1="0" y1="150" x2="1280" y2="150" stroke-opacity="0.55"/>
    <line x1="0" y1="210" x2="1280" y2="210" stroke-opacity="0.55"/>
  </g>
  <!-- red margin rule -->
  <line x1="96" y1="0" x2="96" y2="300" stroke="#c9705e" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- marginalia network sketch, right side -->
  <g stroke="#7a6c50" stroke-opacity="0.5" stroke-width="1.2" fill="none">
    <path d="M 980 80 L 1080 120 L 1180 70"/>
    <path d="M 1080 120 L 1050 200 L 1150 240"/>
    <path d="M 1050 200 L 930 230 L 900 150 L 980 80"/>
    <path d="M 1180 70 L 1230 160 L 1150 240"/>
    <path d="M 900 150 L 1050 200"/>
  </g>
  <g fill="#f3ecdc" stroke="#7a6c50" stroke-width="1.5">
    <circle cx="980" cy="80" r="6"/>
    <circle cx="1080" cy="120" r="8" fill="#c9705e" stroke="#a85846"/>
    <circle cx="1180" cy="70" r="5"/>
    <circle cx="1050" cy="200" r="7"/>
    <circle cx="1150" cy="240" r="5"/>
    <circle cx="930" cy="230" r="5"/>
    <circle cx="900" cy="150" r="6"/>
    <circle cx="1230" cy="160" r="4"/>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="128" y="140" font-size="58" fill="#2e2718" letter-spacing="0.5">Agents<tspan fill="#c9705e" font-style="italic">4</tspan>Academia</text>
    <text x="130" y="188" font-size="22" font-style="italic" fill="#6b5f45">A community of researchers building agentic tools for academic work</text>
    <text x="130" y="242" font-size="15" fill="#8a7c5e" letter-spacing="3">LEARN TOGETHER &#183; BUILD TOGETHER</text>
  </g>

  <rect x="0.5" y="0.5" width="1279" height="299" fill="none" stroke="#d8cdb4" stroke-width="1"/>
</svg>
